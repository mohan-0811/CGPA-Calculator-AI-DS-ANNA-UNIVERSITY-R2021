<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & DS - Anna University GPA/CGPA Calculator (R2021)</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --table-alt: #F3F4F6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: var(--primary);
            background-color: #EEF2FF;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 25px;
            background-color: var(--table-alt);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            background-color: white;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        
        select:focus {
            border-color: var(--primary);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th, td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: #FAFAFA;
        }
        
        tr:hover {
            background-color: #F3F4F6;
        }
        
        .subject-code {
            color: var(--primary);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        
        .subject-name {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
        }

        .result-box {
            background-color: #EEF2FF;
            border: 2px dashed #C7D2FE;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }
        
        .btn:active {
            transform: scale(0.98);
        }

        .sem-badge {
            background-color: #E5E7EB;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anna University Calculator</h1>
    <p class="subtitle">B.Tech AI & DS (2021 Regulation)</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gpa')">Semester GPA</button>
        <button class="tab-btn" onclick="switchTab('cgpa-detailed')">Overall CGPA</button>
    </div>

    <div id="gpa" class="tab-content active">
        <div class="form-group">
            <label for="sem-select">Select Current Semester:</label>
            <select id="sem-select" onchange="renderGpaTable()">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>
        </div>

        <div class="table-container">
            <table id="gpa-table">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th style="width: 30%;">Grade</th>
                    </tr>
                </thead>
                <tbody id="gpa-tbody"></tbody>
            </table>
        </div>

        <button class="btn" onclick="calculateGPA()">Calculate GPA</button>
        <div id="gpa-result" class="result-box" style="display: none;"></div>
    </div>

    <div id="cgpa-detailed" class="tab-content">
        <div class="form-group">
            <label for="cgpa-sem-select">Calculate CGPA up to Semester:</label>
            <select id="cgpa-sem-select" onchange="renderDetailedTable()">
                <option value="0" selected disabled>-- Select latest completed semester --</option>
                <option value="1">Semester 1 (1st Sem Only)</option>
                <option value="2">Semester 2 (Sems 1-2)</option>
                <option value="3">Semester 3 (Sems 1-3)</option>
                <option value="4">Semester 4 (Sems 1-4)</option>
                <option value="5">Semester 5 (Sems 1-5)</option>
                <option value="6">Semester 6 (Sems 1-6)</option>
                <option value="7">Semester 7 (Sems 1-7)</option>
                <option value="8">Semester 8 (All 8 Semesters)</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="detailed-cgpa-table" style="display: none;">
                <thead>
                    <tr>
                        <th style="width: 10%;">Sem</th>
                        <th>Subject</th>
                        <th style="width: 30%;">Grade</th>
                    </tr>
                </thead>
                <tbody id="detailed-cgpa-tbody"></tbody>
            </table>
        </div>

        <button class="btn" id="btn-calc-detailed" style="display: none;" onclick="calculateDetailedCGPA()">Calculate Overall CGPA</button>
        <div id="detailed-cgpa-result" class="result-box" style="display: none;"></div>
    </div>

</div>

<script>
    // Hardcoded alphabetically by Subject Code
    const syllabus = {
        1: [
            {code: "BS3171", name: "Physics & Chemistry Lab", credits: 2},
            {code: "CY3151", name: "Engineering Chemistry", credits: 3},
            {code: "GE3151", name: "Problem Solving and Python Programming", credits: 3},
            {code: "GE3152", name: "Heritage of Tamils", credits: 1},
            {code: "GE3171", name: "Python Programming Laboratory", credits: 2},
            {code: "GE3172", name: "English Laboratory", credits: 1},
            {code: "HS3151", name: "Professional English - I", credits: 3},
            {code: "MA3151", name: "Matrices and Calculus", credits: 4},
            {code: "PH3151", name: "Engineering Physics", credits: 3}
        ],
        2: [
            {code: "AD3251", name: "Data Structures Design", credits: 3},
            {code: "AD3271", name: "Data Structures Design Lab", credits: 2},
            {code: "BE3251", name: "Basic Electrical & Electronics Engineering", credits: 3},
            {code: "GE3251", name: "Engineering Graphics", credits: 4},
            {code: "GE3252", name: "Tamils and Technology", credits: 1},
            {code: "GE3271", name: "Engineering Practices Lab", credits: 2},
            {code: "GE3272", name: "Communication Lab", credits: 2},
            {code: "HS3251", name: "Professional English - II", credits: 2},
            {code: "MA3251", name: "Statistics and Numerical Methods", credits: 4},
            {code: "PH3256", name: "Physics for Information Science", credits: 3}
        ],
        3: [
            {code: "AD3301", name: "Data Exploration and Visualization", credits: 4},
            {code: "AD3311", name: "Artificial Intelligence Lab", credits: 1.5},
            {code: "AD3351", name: "Design and Analysis of Algorithms", credits: 4},
            {code: "AD3381", name: "Database Design & Management Lab", credits: 1.5},
            {code: "AD3391", name: "Database Design & Management", credits: 3},
            {code: "AL3391", name: "Artificial Intelligence", credits: 3},
            {code: "CS3351", name: "Digital Principles & Computer Organization", credits: 4},
            {code: "GE3361", name: "Professional Development", credits: 1},
            {code: "MA3354", name: "Discrete Mathematics", credits: 4}
        ],
        4: [
            {code: "AD3411", name: "Data Science and Analytics Lab", credits: 2},
            {code: "AD3491", name: "Fundamentals of Data Science", credits: 3},
            {code: "AL3451", name: "Machine Learning", credits: 3},
            {code: "AL3452", name: "Operating Systems", credits: 4},
            {code: "AL3461", name: "Machine Learning Lab", credits: 2},
            {code: "CS3591", name: "Computer Networks", credits: 4},
            {code: "GE3451", name: "Environmental Sciences & Sustainability", credits: 2},
            {code: "MA3391", name: "Probability and Statistics", credits: 4}
        ],
        5: [
            {code: "AD3501", name: "Deep Learning", credits: 3},
            {code: "AD3511", name: "Deep Learning Lab", credits: 2},
            {code: "AD3512", name: "Summer Internship", credits: 2},
            {code: "CCS334", name: "Big Data Analytics", credits: 3},
            {code: "CCS335", name: "Cloud Computing", credits: 3},
            {code: "CCW331", name: "Business Analytics", credits: 3},
            {code: "CS3551", name: "Distributed Computing", credits: 3},
            {code: "CW3551", name: "Data and Information Security", credits: 3}
        ],
        6: [
            {code: "CCS332", name: "App Development", credits: 3},
            {code: "CCS341", name: "Data Warehousing", credits: 3},
            {code: "CCS345", name: "Ethics and AI", credits: 3},
            {code: "CCS371", name: "Video Creation and Editing", credits: 3},
            {code: "CS3661", name: "Embedded Systems and IoT Lab", credits: 2},
            {code: "CS3691", name: "Embedded Systems and IoT", credits: 4},
            {code: "SB8051", name: "Naan Mudhalvan", credits: 2}
        ],
        7: [
            {code: "AI3021", name: "IT in Agriculture", credits: 3},
            {code: "GE3751", name: "Principles of Management", credits: 3},
            {code: "GE3791", name: "Human Values and Ethics", credits: 2},
            {code: "NM1117", name: "Naan Mudhalvan", credits: 2},
            {code: "OGI352", name: "Geographical Information Systems", credits: 3}
        ],
        8: [
            {code: "AD3811", name: "Project Work", credits: 10}
        ]
    };

    const grades = {
        "O": 10, "A+": 9, "A": 8, "B+": 7, "B": 6, "C": 5, "U": 0, "NA": -1
    };

    const gradeOptionsHtml = Object.keys(grades).map(g => `<option value="${g}">${g}</option>`).join('');

    // Switch Tabs
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- TAB 1: GPA Calculation ---
    function renderGpaTable() {
        const sem = document.getElementById('sem-select').value;
        const tbody = document.getElementById('gpa-tbody');
        tbody.innerHTML = '';
        
        syllabus[sem].forEach((sub, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="subject-code">${sub.code}</div>
                        <div class="subject-name">${sub.name}</div>
                    </td>
                    <td><select id="gpa-grade-${index}"><option value="NA" selected>Select</option>${gradeOptionsHtml}</select></td>
                </tr>
            `;
        });
        document.getElementById('gpa-result').style.display = 'none';
    }

    function calculateGPA() {
        const sem = document.getElementById('sem-select').value;
        let totalCredits = 0;
        let earnedPoints = 0;

        syllabus[sem].forEach((sub, index) => {
            const grade = document.getElementById(`gpa-grade-${index}`).value;
            if (grade !== "NA") {
                totalCredits += sub.credits;
                earnedPoints += sub.credits * grades[grade];
            }
        });

        const resultBox = document.getElementById('gpa-result');
        if (totalCredits === 0) {
            resultBox.innerHTML = "Please select grades for at least one subject.";
        } else {
            let rawGpa = earnedPoints / totalCredits;
            const gpa = (Math.round((rawGpa + Number.EPSILON) * 100) / 100).toFixed(2);
            resultBox.innerHTML = `Your Semester ${sem} GPA is: ${gpa}`;
        }
        resultBox.style.display = 'block';
    }

    // --- TAB 2: Detailed CGPA ---
    function renderDetailedTable() {
        const upToSem = parseInt(document.getElementById('cgpa-sem-select').value);
        const tbody = document.getElementById('detailed-cgpa-tbody');
        tbody.innerHTML = '';
        
        if (upToSem === 0) return;

        // Loop from Semester 1 up to the selected semester
        for(let i = 1; i <= upToSem; i++) {
            syllabus[i].forEach((sub, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td><span class="sem-badge">S${i}</span></td>
                        <td>
                            <div class="subject-code">${sub.code}</div>
                            <div class="subject-name">${sub.name}</div>
                        </td>
                        <td><select class="det-grade" data-cred="${sub.credits}"><option value="NA" selected>Select</option>${gradeOptionsHtml}</select></td>
                    </tr>
                `;
            });
        }

        document.getElementById('detailed-cgpa-table').style.display = 'table';
        document.getElementById('btn-calc-detailed').style.display = 'block';
        document.getElementById('detailed-cgpa-result').style.display = 'none';
    }

    function calculateDetailedCGPA() {
        const gradeSelects = document.querySelectorAll('.det-grade');
        
        let totalCredits = 0;
        let earnedPoints = 0;

        for(let i = 0; i < gradeSelects.length; i++) {
            const grade = gradeSelects[i].value;
            if(grade !== "NA") {
                const credits = parseFloat(gradeSelects[i].getAttribute('data-cred'));
                totalCredits += credits;
                earnedPoints += credits * grades[grade];
            }
        }

        const resultBox = document.getElementById('detailed-cgpa-result');
        if (totalCredits === 0) {
            resultBox.innerHTML = "Please select grades for completed subjects.";
        } else {
            let rawCgpa = earnedPoints / totalCredits;
            const cgpa = (Math.round((rawCgpa + Number.EPSILON) * 100) / 100).toFixed(2);
            resultBox.innerHTML = `Your Overall CGPA is: ${cgpa}`;
        }
        resultBox.style.display = 'block';
    }

    // Initialize on load
    window.onload = () => {
        renderGpaTable();
    };
</script>

</body>
</html>
